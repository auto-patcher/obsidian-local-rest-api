name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.build.outputs.artifact }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix with Cachix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            trusted-users = root runner

      - name: Build with Bun
        id: build
        run: |
          nix develop --command bash -c '
            set -e
            bun install --frozen-lockfile
            bun run typecheck
            bun run build
            bun run build-docs
          '
          mkdir -p artifacts
          cp main.js artifacts/ 2>/dev/null || true
          cp manifest.json artifacts/ 2>/dev/null || true
          cp main.css artifacts/ 2>/dev/null || true
          cp docs/openapi.yaml artifacts/ 2>/dev/null || true
          cd artifacts && tar -czf ../obsidian-local-rest-api-${GITHUB_REF#refs/tags/}.tar.gz .
          echo "artifact=obsidian-local-rest-api-${GITHUB_REF#refs/tags/}.tar.gz" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-artifact
          path: obsidian-local-rest-api-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-artifact

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            obsidian-local-rest-api-*.tar.gz
