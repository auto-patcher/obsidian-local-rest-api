name: Build on Main

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v10

      - name: Build with Bun
        run: |
          nix develop --command bash -c '
            set -e
            bun install --frozen-lockfile
            bun run typecheck
            bun run build
            bun run build-docs
          '

      - name: Package artifacts
        run: |
          mkdir -p artifacts
          cp main.js artifacts/ 2>/dev/null || true
          cp manifest.json artifacts/ 2>/dev/null || true
          cp main.css artifacts/ 2>/dev/null || true
          cp docs/openapi.yaml artifacts/ 2>/dev/null || true
          cd artifacts && tar -czf ../obsidian-local-rest-api.tar.gz . || echo "Empty artifacts"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: obsidian-local-rest-api
          path: obsidian-local-rest-api.tar.gz
